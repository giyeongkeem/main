# 섹터 뉴스 리포트 에이전트 설정
#
# sectors 아래에 관심 섹터를 자유롭게 추가/수정하세요.
# keywords는 검색 정확도를 높이기 위한 힌트입니다 (종목명, 테마 등).

report:
  language: ko
  output_dir: reports
  timezone: Asia/Seoul

model:
  name: claude-opus-4-8
  effort: high
  # 섹터당 웹 검색 최대 횟수 (비용 제어)
  max_web_searches_per_sector: 8

sectors:
  domestic:
    - name: 반도체
      keywords: [삼성전자, SK하이닉스, HBM, 파운드리, 반도체 수출]
    - name: 2차전지
      keywords: [LG에너지솔루션, 삼성SDI, 에코프로, 전고체 배터리, 양극재]
    - name: 바이오/제약
      keywords: [삼성바이오로직스, 셀트리온, 신약 승인, 기술수출]
  overseas:
    - name: AI / 빅테크
      keywords: [NVIDIA, Microsoft, Google, OpenAI, AI 데이터센터 투자]
    - name: 미국 반도체
      keywords: [TSMC, AMD, Broadcom, 반도체 장비, 수출 규제]
