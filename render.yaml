# Render.com 배포 설정 (무료 플랜 가능)
# 1. github에 푸시 → render.com 에서 "New + → Blueprint" → 이 저장소 선택
# 2. 배포 후 Environment 탭에서 ANTHROPIC_API_KEY, APP_PASSWORD 값을 입력
services:
  - type: web
    name: sector-news-agent
    runtime: docker
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # 대시보드에서 직접 입력 (시크릿)
      - key: APP_PASSWORD
        sync: false        # 공개 URL 접속용 비밀번호 (직접 입력)

  # 소셜미디어 트렌드 대시보드 (API 키·비밀번호 없이 동작, API 비용 없음)
  - type: web
    name: sns-trend-dashboard
    runtime: docker
    plan: free
    dockerCommand: python -m trend_dashboard
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false        # 선택: 넣으면 YouTube 공식 API로 더 안정적 수집 (비워둬도 동작)
