name: 어디주차 릴리즈 (v* 태그)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "릴리즈 버전 태그 (예: v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.32.8"
  VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: parking-app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze && flutter test
      - run: flutter build ios --release --no-codesign
      - name: IPA 패키징
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -qry "eodijucha-${VERSION}-unsigned.ipa" Payload
      - uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: parking-app/eodijucha-*-unsigned.ipa

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parking-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - name: APK 이름 정리
        run: cp build/app/outputs/flutter-apk/app-release.apk "eodijucha-${VERSION}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: parking-app/eodijucha-*.apk

  release:
    needs: [ios, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          target_commitish: ${{ github.sha }}
          name: "어디주차 ${{ env.VERSION }}"
          generate_release_notes: true
          body: |
            ## 설치 방법

            ### 갤럭시 / 안드로이드
            아래 `eodijucha-*.apk`를 폰에서 받아 열면 바로 설치됩니다. (설정에서 "출처를 알 수 없는 앱 설치" 허용 필요)

            ### 아이폰
            `eodijucha-*-unsigned.ipa`는 서명이 없는 파일입니다. Mac(Xcode) 또는 PC의 [Sideloadly](https://sideloadly.io/)로
            본인 Apple ID 서명 후 설치하세요. 자세한 방법: [parking-app/README.md](https://github.com/giyeongkeem/main/blob/claude/parking-location-tracker-hp4cx3/parking-app/README.md)

            ### 웹 버전 (설치 없이 바로 사용)
            https://giyeongkeem.github.io/main/
          files: |
            eodijucha-*.apk
            eodijucha-*-unsigned.ipa
