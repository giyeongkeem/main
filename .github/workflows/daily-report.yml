name: Daily Sector Report

on:
  schedule:
    # 매일 한국시간 오전 7:30 (UTC 22:30, 전일)
    - cron: "30 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # config.yaml은 로컬(맥북 ollama) 기준 — CI에서는 claude 백엔드를 강제
          SECTOR_AGENT_BACKEND: claude
          # 커밋·푸시는 아래 "Commit report" 스텝이 전담 (에이전트 내부 아카이빙 중복 방지)
          SECTOR_AGENT_ARCHIVE_GIT: "false"
          # Notion 아카이빙: 저장소 시크릿에 NOTION_API_KEY를 등록하면 활성화 (없으면 생략됨)
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python -m sector_news_agent

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "report: $(date +%Y-%m-%d) 데일리 섹터 리포트"
          git push
