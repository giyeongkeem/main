name: 어디주차 앱 빌드 (iOS/Android)

on:
  workflow_dispatch:
  push:
    branches: [claude/parking-location-tracker-hp4cx3, main]
    paths: ["parking-app/**", ".github/workflows/build-app.yml"]

env:
  FLUTTER_VERSION: "3.32.8"

jobs:
  # ---------- iOS: 서명 없는 IPA (사이드로딩용) ----------
  ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: parking-app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 의존성 설치
        run: flutter pub get

      - name: 정적 분석 + 테스트
        run: |
          flutter analyze
          flutter test

      - name: iOS 빌드 (서명 없음)
        run: flutter build ios --release --no-codesign

      - name: IPA 패키징
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -qry eodijucha-unsigned.ipa Payload
          ls -lh eodijucha-unsigned.ipa

      - name: IPA 업로드
        uses: actions/upload-artifact@v4
        with:
          name: eodijucha-ios-unsigned-ipa
          path: parking-app/eodijucha-unsigned.ipa
          retention-days: 14

  # ---------- Android: 바로 설치 가능한 APK ----------
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parking-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 의존성 설치
        run: flutter pub get

      - name: APK 빌드 (디버그 키 서명 — 바로 설치 가능)
        run: flutter build apk --release

      - name: APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: eodijucha-android-apk
          path: parking-app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
